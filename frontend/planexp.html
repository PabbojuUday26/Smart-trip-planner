<body >

    <div class="menu">

            <li><a href="#"><span class="material-symbols-outlined">dashboard</span><span>Planning expenses</span></a></li>

    </div>
        <div class="expense-container">
        <div class="expense-summary-section">
            <form class="expense-form">
                <h2>Add New Expense</h2>
                <input type="text" placeholder="Expense Category" required>
                <input type="number" placeholder="Amount" required>
                <input type="date" required>
                <textarea placeholder="Description"></textarea>
                <button type="submit">Add Expense</button>
            </form>
        </div>   
        <div class="expense-list">
            <h2>Expense Summary</h2>
            <div class="expense-item">
                <div class="expense-item-description">
                    <h3>Food</h3>
                    <p>Spent on food</p>
                </div>
                <div class="expense-item-amount">
                    <h3>$200</h3>
                </div>
            </div>
        </div>
    </div>

    <script src="planexp.js"></script>
